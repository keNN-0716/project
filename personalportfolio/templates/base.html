{% load static %}
<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>My Portfolio</title>
            <link rel="stylesheet" href="{% static 'css/output.css' %}">
            <link rel="stylesheet" href="{% static 'css/styles.css' %}">
        </head>
        <body class="font-mono">
            <div class="flex flex-col min-h-screen grid grid-rows-[auto_1fr_auto]">
                <header>
                    <nav id="main-navbar">
                        <div class="nav-links">
                            <a href="#home" class="nav-link">Home</a>
                            <a href="#about" class="nav-link">About</a>
                            <a href="#projects" class="nav-link">Projects</a>
                            <a href="#skills" class="nav-link">Skills</a>
                        </div>
                    </nav>
                </header>

                <main class="p-8 pt-12 mx-auto flex-grow">
                    {% block content %}
                    {% endblock %}
                </main>

                <footer id="main-footer">
                    <p>&copy; {% now "Y" %} My Portfolio</p>
                </footer>
        </div>
        <button id="fixed-float-btn" class="fixed-float-button">🔒</button>

        <!-- Numpad Modal -->
        <div id="numpadModal" class="numpad-modal">
            <div class="numpad-container">
                <div class="numpad-display" id="numpadDisplay">_ _ _</div>
                <div class="numpad-grid">
                    <button class="numpad-key" data-value="1">1</button>
                    <button class="numpad-key" data-value="2">2</button>
                    <button class="numpad-key" data-value="3">3</button>
                    <button class="numpad-key" data-value="4">4</button>
                    <button class="numpad-key" data-value="5">5</button>
                    <button class="numpad-key" data-value="6">6</button>
                    <button class="numpad-key" data-value="7">7</button>
                    <button class="numpad-key" data-value="8">8</button>
                    <button class="numpad-key" data-value="9">9</button>
                    <button class="numpad-key numpad-clear" data-value="clear">✕</button>
                    <button class="numpad-key" data-value="0">0</button>
                    <button class="numpad-key numpad-close" data-value="close">✓</button>
                </div>
            </div>
        </div>

        <script src="{% static 'script/scripts.js' %}"></script>
    </body>
</html>
